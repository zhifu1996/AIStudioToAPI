name: Auto Sync Upstream
on:
  schedule:
    - cron: '0 8 * * *' # 每天北京时间 16:00 执行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/iBUHub/AIStudioToAPI.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || (echo "Conflict detected, manual merge required" && exit 1)
          git push origin main
